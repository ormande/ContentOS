<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ContentOS</title>
    <script>
      (function () {
        var pref = localStorage.getItem("contentos-theme");
        var theme = pref === "dark" ? "dark" : pref === "light" ? "light"
          : (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>
    <link rel="icon" href="./assets/brand/favicon-40-dark.png" type="image/png" sizes="40x40" />
    <link rel="apple-touch-icon" href="./assets/brand/logo-square-dark.png" />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <div id="app" class="shell">
      <aside class="sidebar" aria-label="Seções">
        <div class="brand">
          <a class="brand-link" href="#dashboard" aria-label="ContentOS — ir para o dashboard">
            <img class="brand-logo brand-logo-full" src="./assets/brand/logo-navbar-dark.png" alt="" width="200" height="56" />
            <img class="brand-logo brand-logo-compact" src="./assets/brand/logo-square-dark.png" alt="" width="40" height="40" />
          </a>
          <button id="sidebarToggle" class="sidebar-toggle" type="button" aria-label="Recolher menu" aria-expanded="true">
            <span aria-hidden="true">&#8249;</span>
          </button>
        </div>

        <nav class="nav" id="sectionNav"></nav>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div class="search-wrap">
            <label for="globalSearch">Busca</label>
            <input id="globalSearch" type="search" placeholder="Buscar ideia, vídeo, texto ou arquivo" />
          </div>

          <div class="quick-actions">
            <button id="newIdeaBtn" class="primary-action" type="button">Nova ideia</button>
            <button id="newPieceBtn" class="ghost-action" type="button">Novo vídeo</button>
          </div>
        </header>

        <section class="section-header">
          <div>
            <p id="sectionKicker" class="kicker"></p>
            <h2 id="sectionTitle"></h2>
          </div>
          <p id="sectionMetric" class="metric"></p>
        </section>

        <section id="contentArea" class="content-area" aria-live="polite"></section>
      </main>
    </div>

    <template id="emptyStateTemplate">
      <div class="empty-state">
        <strong>Nada por aqui ainda.</strong>
        <span>Comece por uma ideia solta ou por um vídeo em produção.</span>
      </div>
    </template>

    <div id="modalRoot" class="modal-root" hidden aria-hidden="true"></div>

    <script src="./contentos-config.js"></script>
    <script src="./node_modules/@supabase/supabase-js/dist/umd/supabase.js"></script>
    <script type="module" src="./src/app.js"></script>
  </body>
</html>
